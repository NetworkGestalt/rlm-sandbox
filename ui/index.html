<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RLM Sandbox</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #121212;
    color: #cdd6f4;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 2rem;
    padding-bottom: 10rem;
    min-height: 100vh;
  }

  h1 {
    font-size: 1.2rem;
    font-weight: 500;
    color: #a6adc8;
    margin-bottom: 0.6rem;
    letter-spacing: 0.02em;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
    margin-top: -14px;
  }

  #status {
    font-size: 0.94rem;
    color: #585b70;
    margin-bottom: 1.25rem;
    min-height: 1.2em;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }

  #status.connected { color: #a6e3a1; }
  #status.error { color: #f38ba8; }

  #blocks {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
    padding-bottom: 180px;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #181818; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }

  .block {
    border-radius: 10px;
    overflow: hidden;
    animation: fadeIn 0.25s ease-out;
    border: 1px solid #555;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.75rem;
    background: #2a2a2a;
    font-size: 0.91rem;
    color: #a6adc8;
  }

  .block-code {
    background: #2a2a2a;
    padding: 0.25rem 1rem 0.75rem;
  }

  .block-code pre {
    margin: 0;
    font-size: 0.72rem;
    line-height: 1.5;
  }

  .block-code code {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    background: none !important;
    padding: 0 !important;
  }

  .block-code .hljs-built_in {
    color: #DCDCAA;
  }

  .block-code .llm-call-highlight {
    color: #a6e3a1;
  }

  .block-output {
    background: #1e1e1e;
    border-top: 1px solid #2a2a2a;
    padding: 1rem;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.68rem;
    line-height: 1.5;
    color: #a6adc8;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 300px;
    overflow-y: auto;
  }

  .block-error {
    background: #1e1e1e;
    border-top: 1px solid #2a2a2a;
    padding: 1rem;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.68rem;
    line-height: 1.5;
    color: #f38ba8cc;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 300px;
    overflow-y: auto;
  }

  .block-text {
    background: #212121;
    padding: 1rem;
    font-size: 0.68rem;
    line-height: 1.6;
    color: #cdd6f4;
    white-space: pre-wrap;
  }

  .block-final {
    background: #202020;
    border: 1px solid #555;
    border-radius: 10px;
    padding: 1rem;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.68rem;
    line-height: 1.5;
    color: #a6e3a1cc;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-y: auto;
    animation: fadeIn 0.25s ease-out;
  }

  #controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #0a0a0a;
    border-top: 1px solid #2a2a2a;
    padding: 0.55rem 2rem 0.7rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    align-items: center;
    overflow: hidden;
  }

  #resize-handle {
    width: 100%;
    height: 6px;
    cursor: ns-resize;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
  }

  #resize-handle::after {
    content: '';
    width: 40px;
    height: 3px;
    background: #555;
    border-radius: 2px;
    transition: background 0.15s;
  }

  #resize-handle:hover::after {
    background: #888;
  }

  #controls-inner {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    flex: 1;
    min-height: 0;
  }

  #controls input,
  #controls textarea {
    width: 100%;
    background: #212121;
    border: 1px solid #555;
    border-radius: 8px;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 0.78rem;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.15s;
  }

  #controls input:focus,
  #controls textarea:focus {
    border-color: #888;
  }

  #controls textarea {
    resize: none;
    line-height: 1.5;
    flex: 1;
    min-height: 0;
  }

  #task-row {
    display: flex;
    gap: 0.5rem;
    align-items: stretch;
    flex: 1;
    min-height: 0;
  }

  #btn-col {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    flex-shrink: 0;
    align-self: flex-start;
  }

  #btn-col button {
    width: 5.5rem;
    background: #2a2a2a;
    border: 1px solid #555;
    border-radius: 8px;
    color: #cdd6f4;
    font-size: 0.78rem;
    padding: 0.5rem 0;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  #btn-col button:hover { background: #333; border-color: #666; }
  #btn-col button:disabled { opacity: 0.4; cursor: not-allowed; }


  .spinner {
    display: inline-block;
    width: 17px;
    height: 17px;
    border: 2.5px solid #585b70;
    border-top-color: #cdd6f4;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <h1>RLM Sandbox</h1>
  <div id="status"></div>
  <div id="blocks"></div>
  <div id="controls">
    <div id="resize-handle"></div>
    <div id="controls-inner">
      <div id="dir-row">
        <input id="dir-input" type="text" placeholder="Project directory" value="">
      </div>
      <div id="task-row">
        <textarea id="task-input" rows="3" placeholder="Describe your task..."></textarea>
        <div id="btn-col">
          <button id="run-btn">Run</button>
          <button id="interrupt-btn" disabled>Interrupt</button>
        </div>
      </div>
    </div>
  </div>

<script>
const blocks = document.getElementById('blocks');
const status = document.getElementById('status');
const runBtn = document.getElementById('run-btn');
const interruptBtn = document.getElementById('interrupt-btn');
const taskInput = document.getElementById('task-input');
const dirInput = document.getElementById('dir-input');
const dirRow = document.getElementById('dir-row');
const taskRow = document.getElementById('task-row');
let currentBlock = null;
let activeWs = null;

// Drag-to-resize: just resize the whole #controls box
{
  const handle = document.getElementById('resize-handle');
  const controls = document.getElementById('controls');
  let dragging = false;
  let startY = 0;
  let startH = 0;
  const MIN_H = 10;
  const MAX_H = 600;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startY = e.clientY;
    startH = controls.offsetHeight;
    document.body.style.cursor = 'ns-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newH = Math.min(MAX_H, Math.max(MIN_H, startH + (startY - e.clientY)));
    controls.style.height = newH + 'px';
  });

  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  handle.addEventListener('dblclick', () => {
    controls.style.height = '';
  });
}

const savedDir = localStorage.getItem('rlm-dir');
const savedTask = localStorage.getItem('rlm-task');
if (savedDir) dirInput.value = savedDir;
if (savedTask) taskInput.value = savedTask;

fetch('/defaults')
  .then(r => r.json())
  .then(d => {
    if (!dirInput.value) dirInput.value = d.directory;
    if (!taskInput.value) taskInput.value = d.task;
  });

dirInput.addEventListener('input', () => localStorage.setItem('rlm-dir', dirInput.value));
taskInput.addEventListener('input', () => localStorage.setItem('rlm-task', taskInput.value));

function setRunning(running) {
  runBtn.disabled = running;
  interruptBtn.disabled = !running;
  dirRow.style.display = running ? 'none' : '';
  taskRow.style.marginTop = running ? '0.1rem' : '';
}

function highlightLlmCall(codeEl) {
  codeEl.innerHTML = codeEl.innerHTML.replace(
    /\bllm_call\b/g,
    '<span class="llm-call-highlight">llm_call</span>'
  );
}

runBtn.addEventListener('click', () => {
  const task = taskInput.value.trim();
  const directory = dirInput.value.trim();
  if (!task || !directory) return;
  localStorage.setItem('rlm-dir', directory);
  localStorage.setItem('rlm-task', task);
  setRunning(true);
  blocks.innerHTML = '';
  connect(task, directory);
});

interruptBtn.addEventListener('click', () => {
  if (activeWs && activeWs.readyState === WebSocket.OPEN) {
    activeWs.send(JSON.stringify({ type: 'interrupt' }));
    interruptBtn.disabled = true;
  }
});

function connect(task, directory) {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  activeWs = ws;

  ws.onopen = () => {
    status.textContent = 'Connected...';
    status.className = 'connected';
    ws.send(JSON.stringify({ task, directory }));
  };

  ws.onmessage = (e) => {
    const event = JSON.parse(e.data);

    if (event.type === 'status') {
      status.textContent = event.message;
    }

    if (event.type === 'code') {
      const block = document.createElement('div');
      block.className = 'block';
      block.dataset.turn = event.turn;
      block.innerHTML = `
        <div class="block-header">
          <span>Turn ${event.turn}</span>
          <span class="spinner"></span>
        </div>
        <div class="block-code">
          <pre><code class="language-python"></code></pre>
        </div>
      `;
      const codeEl = block.querySelector('code');
      codeEl.textContent = event.code;
      hljs.highlightElement(codeEl);
      highlightLlmCall(codeEl);

      blocks.appendChild(block);
      currentBlock = block;
    }

    if (event.type === 'output' && currentBlock) {
      const spinner = currentBlock.querySelector('.spinner');
      if (spinner) spinner.remove();

      const errorMarker = '\n[error]\n';
      const errorIdx = event.output.indexOf(errorMarker);
      const startsWithError = event.output.startsWith('[error]\n');

      if (errorIdx !== -1 || startsWithError) {
        const splitPos = startsWithError ? 0 : errorIdx;
        const stdoutPart = event.output.slice(0, splitPos);
        const errorPart = startsWithError
          ? event.output.slice('[error]\n'.length)
          : event.output.slice(errorIdx + errorMarker.length);

        if (stdoutPart) {
          const output = document.createElement('div');
          output.className = 'block-output';
          output.textContent = stdoutPart;
          currentBlock.appendChild(output);
        }

        const errorDiv = document.createElement('div');
        errorDiv.className = 'block-error';
        errorDiv.textContent = errorPart;
        currentBlock.appendChild(errorDiv);
      } else {
        const output = document.createElement('div');
        output.className = 'block-output';
        output.textContent = event.output;
        currentBlock.appendChild(output);
      }

    }

    if (event.type === 'text') {
      const block = document.createElement('div');
      block.className = 'block';

      const header = document.createElement('div');
      header.className = 'block-header';
      header.innerHTML = `<span>Turn ${event.turn} — text</span>`;
      block.appendChild(header);

      // Split on code fences and render each part appropriately
      const parts = event.text.split(/(```[\s\S]*?```)/g);

      parts.forEach(part => {
        const fenceMatch = part.match(/^```(\w*)\n?([\s\S]*?)```$/);
        if (fenceMatch) {
          const lang = fenceMatch[1] || 'python';
          const code = fenceMatch[2].trimEnd();
          const div = document.createElement('div');
          div.className = 'block-code';
          div.innerHTML = `<pre><code class="language-${lang}"></code></pre>`;
          const codeEl = div.querySelector('code');
          codeEl.textContent = code;
          hljs.highlightElement(codeEl);
          highlightLlmCall(codeEl);
          block.appendChild(div);
        } else if (part.trim()) {
          const div = document.createElement('div');
          div.className = 'block-text';
          div.textContent = part.trim();
          block.appendChild(div);
        }
      });

      blocks.appendChild(block);
    }

    if (event.type === 'final') {
      const el = document.createElement('div');
      el.className = 'block-final';
      el.textContent = event.content.replace(/\\n/g, '\n');
      blocks.appendChild(el);
      status.textContent = 'Done.';
    }

    if (event.type === 'interrupted') {
      status.textContent = 'Interrupted.';
      status.className = '';
      setRunning(false);
    }

    if (event.type === 'done') {
      status.textContent = 'Done.';
      setRunning(false);
    }

    if (event.type === 'error') {
      status.textContent = 'Error: ' + event.message;
      status.className = 'error';
      setRunning(false);
    }
  };

  ws.onclose = () => {
    activeWs = null;
    if (status.textContent !== 'Done.') {
      status.textContent = 'Disconnected.';
      status.className = '';
    }
    setRunning(false);
  };
}
</script>
</body>
</html>
